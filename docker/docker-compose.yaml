services:
  fennath:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fennath
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - certs:/data/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /tmp
    env_file:
      - .env

volumes:
  certs:
