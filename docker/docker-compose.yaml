services:
  # Reverse proxy — TLS termination, YARP routing
  # Has: NOTHING sensitive — reads config from shared volume
  # Does NOT have: Docker socket, DNS credentials (see ADR-014)
  fennath-proxy:
    build:
      context: ..
      dockerfile: docker/Dockerfile.proxy
    container_name: fennath-proxy
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - fennath-config:/data/shared:ro
    tmpfs:
      - /tmp
    env_file:
      - env/common.env
      - env/proxy.env
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Operator — Docker discovery, DNS management, ACME certificate provisioning
  # Has: Docker socket (read-only), DNS credentials (Loopia API)
  # Does NOT have: Internet-exposed ports (see ADR-014)
  #
  # Deploy one operator per domain. Each gets its own env_file and secrets.
  # See docker/env/*.env.example for configuration templates.
  fennath-operator-lab:
    build:
      context: ..
      dockerfile: docker/Dockerfile.operator
    container_name: fennath-operator-lab
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      - fennath-config:/data/shared
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /tmp
    env_file:
      - env/common.env
      - env/operator-lab.env
    secrets:
      - source: lab-loopia-username
        target: Fennath__Dns__Loopia__Username
      - source: lab-loopia-password
        target: Fennath__Dns__Loopia__Password
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Uncomment for a second domain:
  # fennath-operator-apps:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile.operator
  #   container_name: fennath-operator-apps
  #   restart: unless-stopped
  #   read_only: true
  #   security_opt:
  #     - no-new-privileges:true
  #   group_add:
  #     - "${DOCKER_GID:-999}"
  #   volumes:
  #     - fennath-config:/data/shared
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #   tmpfs:
  #     - /tmp
  #   env_file:
  #     - env/common.env
  #     - env/operator-apps.env
  #   secrets:
  #     - source: apps-loopia-username
  #       target: Fennath__Dns__Loopia__Username
  #     - source: apps-loopia-password
  #       target: Fennath__Dns__Loopia__Password
  #   logging:
  #     driver: json-file
  #     options:
  #       max-size: "50m"
  #       max-file: "5"

  # Example backend — traefik/whoami echoes request info as plain text.
  # Set fennath.domain to match the operator that should claim this container.
  echo:
    image: traefik/whoami
    container_name: echo
    labels:
      - "fennath.subdomain=echo"
      - "fennath.domain=lab.example.com"

volumes:
  fennath-config:

secrets:
  lab-loopia-username:
    file: ~/.fennath-secrets/lab-loopia-username
  lab-loopia-password:
    file: ~/.fennath-secrets/lab-loopia-password
  # apps-loopia-username:
  #   file: ~/.fennath-secrets/apps-loopia-username
  # apps-loopia-password:
  #   file: ~/.fennath-secrets/apps-loopia-password
