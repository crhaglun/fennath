services:
  fennath:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fennath
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    # Grant access to the Docker socket (host docker group GID)
    group_add:
      - ${DOCKER_GID:-999}
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - certs:/data/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /tmp
    env_file:
      - .env

  # Example backends for experimentation — traefik/whoami echoes
  # request info (headers, hostname, IP) as plain text.
  app-one:
    image: traefik/whoami
    container_name: app-one
    labels:
      - "fennath.subdomain=one"
      - "fennath.backend=http://app-one:80"
      - "fennath.healthcheck.path=/health"

  app-two:
    image: traefik/whoami
    container_name: app-two
    command: --name app-two
    labels:
      - "fennath.subdomain=two"
      - "fennath.backend=http://app-two:80"

volumes:
  certs:
