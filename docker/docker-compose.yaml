services:
  fennath:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fennath
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - certs:/data/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /tmp
    environment:
      # Required — set these in a .env file or override per-host
      - Fennath__Domain=example.com
      - Fennath__Dns__Loopia__Username=user@loopiaapi
      - Fennath__Dns__Loopia__Password=
      - Fennath__Certificates__Email=admin@example.com
      # Non-root container — use unprivileged ports internally
      - Fennath__Server__HttpsPort=8443
      - Fennath__Server__HttpPort=8080
      # Optional — uncomment to enable
      # - Fennath__Certificates__Staging=true
      # - Fennath__Docker__Enabled=true
      # - Fennath__Telemetry__Endpoint=https://otlp-gateway-prod-xx.grafana.net/otlp
      # - Fennath__Telemetry__Headers__Authorization=Basic <base64>

volumes:
  certs:
