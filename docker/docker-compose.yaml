services:
  fennath:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fennath
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    # Grant access to the Docker socket (host docker group GID)
    group_add:
      - ${DOCKER_GID:-999}
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - certs:/data/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /tmp
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Example backends for experimentation — traefik/whoami echoes
  # request info (headers, hostname, IP) as plain text.
  app-one:
    image: traefik/whoami
    container_name: app-one
    labels:
      - "fennath.subdomain=one"
      - "fennath.healthcheck.path=/health"

  app-two:
    image: traefik/whoami
    container_name: app-two
    command: --name app-two
    labels:
      - "fennath.subdomain=two"

volumes:
  certs:
