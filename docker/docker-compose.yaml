services:
  # Reverse proxy — TLS termination, YARP routing
  # Has: NOTHING sensitive — reads config from shared volume
  # Does NOT have: Docker socket, DNS credentials (see ADR-014)
  fennath:
    build:
      context: ..
      dockerfile: docker/Dockerfile.proxy
    container_name: fennath-proxy
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:${Fennath__Server__HttpPort:-8080}"
      - "443:${Fennath__Server__HttpsPort:-8443}"
    volumes:
      - shared:/data/shared:ro
    tmpfs:
      - /tmp
    environment:
      - Fennath__Domain=${Fennath__Domain}
      - Fennath__Subdomain=${Fennath__Subdomain:-}
      - Fennath__Server__HttpsPort=${Fennath__Server__HttpsPort:-8443}
      - Fennath__Server__HttpPort=${Fennath__Server__HttpPort:-8080}
      - Fennath__Certificates__StoragePath=/data/shared/certs
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS:-}
      - OTEL_SERVICE_NAME=fennath-proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${Fennath__Server__HttpPort:-8080}/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Operator — Docker discovery, DNS management, ACME certificate provisioning
  # Has: Docker socket (read-only), DNS credentials (Loopia API)
  # Does NOT have: Internet-exposed ports (see ADR-014)
  fennath-operator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.operator
    container_name: fennath-operator
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    # Grant access to the Docker socket (host docker group GID)
    group_add:
      - ${DOCKER_GID:-999}
    volumes:
      - shared:/data/shared
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /tmp
    environment:
      - Fennath__Domain=${Fennath__Domain}
      - Fennath__Subdomain=${Fennath__Subdomain:-}
      - Fennath__Docker__PollIntervalSeconds=${Fennath__Docker__PollIntervalSeconds:-15}
      - Fennath__Dns__Loopia__Username=${Fennath__Dns__Loopia__Username}
      - Fennath__Dns__Loopia__Password=${Fennath__Dns__Loopia__Password}
      - Fennath__Certificates__Email=${Fennath__Certificates__Email}
      - Fennath__Certificates__Staging=${Fennath__Certificates__Staging:-false}
      - Fennath__Certificates__StoragePath=/data/shared/certs
      - Fennath__Certificates__RenewalCheckIntervalSeconds=${Fennath__Certificates__RenewalCheckIntervalSeconds:-86400}
      - Fennath__Certificates__RenewalThresholdDays=${Fennath__Certificates__RenewalThresholdDays:-30}
      - Fennath__Dns__PublicIpCheckIntervalSeconds=${Fennath__Dns__PublicIpCheckIntervalSeconds:-300}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS:-}
      - OTEL_SERVICE_NAME=fennath-operator
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Example backends for experimentation — traefik/whoami echoes
  # request info (headers, hostname, IP) as plain text.
  app-one:
    image: traefik/whoami
    container_name: app-one
    labels:
      - "fennath.subdomain=one"

  app-two:
    image: traefik/whoami
    container_name: app-two
    command: --name app-two
    labels:
      - "fennath.subdomain=two"

volumes:
  shared:
